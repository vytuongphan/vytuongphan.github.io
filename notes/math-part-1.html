<!-- marked.js for Markdown → HTML -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

<script>
// Mobile nav
var toggle = document.getElementById('nav-toggle');
var navLinks = document.getElementById('nav-links');
toggle.addEventListener('click', function () { navLinks.classList.toggle('open'); });

// Load and render the markdown notes
(function () {
  var loadingEl = document.getElementById('loading');
  var contentEl = document.getElementById('notes-content');

  // Protect math delimiters from the markdown parser
  function protectMath(text) {
    var blocks = [];

    // Protect display math first ($$...$$)
    text = text.replace(/\$\$([\s\S]+?)\$\$/g, function (match) {
      blocks.push(match);
      return '\x00MATHD' + (blocks.length - 1) + '\x00';
    });

    // Protect inline math ($...$) — not preceded/followed by $
    text = text.replace(/\$([^\$\n]{1,200}?)\$/g, function (match) {
      blocks.push(match);
      return '\x00MATHI' + (blocks.length - 1) + '\x00';
    });

    return { text: text, blocks: blocks };
  }

  function restoreMath(html, blocks) {
    html = html.replace(/\x00MATHD(\d+)\x00/g, function (_, i) { return blocks[parseInt(i)]; });
    html = html.replace(/\x00MATHI(\d+)\x00/g, function (_, i) { return blocks[parseInt(i)]; });
    return html;
  }

  fetch('../Math-Part-1.md')
    .then(function (res) {
      if (!res.ok) throw new Error('Failed to load notes');
      return res.text();
    })
    .then(function (md) {
      var protected_ = protectMath(md);
      var html = marked.parse(protected_.text);
      html = restoreMath(html, protected_.blocks);

      contentEl.innerHTML = html;
      loadingEl.style.display = 'none';
      contentEl.style.display = 'block';

      // Render math with KaTeX
      renderMathInElement(contentEl, {
        delimiters: [
          { left: '$$', right: '$$', display: true  },
          { left: '$',  right: '$',  display: false }
        ],
        throwOnError: false
      });
    })
    .catch(function (err) {
      loadingEl.innerHTML = '<p style="color:var(--text-secondary)">Could not load notes. ' + err.message + '</p>';
    });
})();
</script>
